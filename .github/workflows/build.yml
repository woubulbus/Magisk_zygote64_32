name: Build Magisk with zygote64_32

on:
  schedule:
    - cron: '0 12 * * *'  # Check daily at noon UTC
  workflow_dispatch:       # Manual trigger button in GitHub UI
    inputs:
      force_build:
        description: 'Force rebuild even if no new release'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Check for new Magisk release
        id: check
        run: |
          LATEST=$(curl -s https://api.github.com/repos/topjohnwu/Magisk/releases/latest | jq -r '.tag_name')
          echo "Latest Magisk release: $LATEST"

          CURRENT="none"
          if [ -f last_built_tag ]; then
            CURRENT=$(cat last_built_tag)
          fi
          echo "Last built against: $CURRENT"

          FORCE="${{ github.event.inputs.force_build }}"

          if [ "$LATEST" = "$CURRENT" ] && [ "$FORCE" != "true" ]; then
            echo "No new release. Skipping build."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "New release found or force build requested."
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "tag=$LATEST" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 21
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Clone Magisk
        if: steps.check.outputs.skip != 'true'
        run: |
          git clone --recurse-submodules https://github.com/topjohnwu/Magisk.git magisk-src
          cd magisk-src
          git checkout ${{ steps.check.outputs.tag }}
          git submodule update --init --recursive

      - name: Apply zygote64_32 patch
        if: steps.check.outputs.skip != 'true'
        run: |
          cd magisk-src
          echo "Attempting to apply patch..."
          if git apply --check ../zygote64_32.patch 2>&1; then
            git apply ../zygote64_32.patch
            echo "Patch applied cleanly."
          else
            echo "::error::Patch failed to apply. rootdir.cpp has likely changed upstream."
            echo "::error::The patch needs to be updated for Magisk ${{ steps.check.outputs.tag }}"
            exit 1
          fi

      - name: Set up NDK
        if: steps.check.outputs.skip != 'true'
        run: |
          cd magisk-src
          python build.py -v ndk

      - name: Build Magisk
        if: steps.check.outputs.skip != 'true'
        run: |
          cd magisk-src
          python build.py -vr all

      - name: Collect build output
        if: steps.check.outputs.skip != 'true'
        run: |
          cp magisk-src/out/app-release.apk app-release.apk

          # Update the tag tracker
          echo "${{ steps.check.outputs.tag }}" > last_built_tag

          # Update canary.json with version info
          MAGISK_VER=$(echo "${{ steps.check.outputs.tag }}" | sed 's/v//')
          MAGISK_VCODE=$(echo "$MAGISK_VER" | tr -d '.')
          cat > canary.json << EOF
          {
            "magisk": {
              "version": "${MAGISK_VER}-zygote64_32",
              "versionCode": "${MAGISK_VCODE}",
              "link": "https://raw.githubusercontent.com/${{ github.repository }}/master/app-release.apk",
              "note": "https://github.com/${{ github.repository }}/blob/master/README.md"
            }
          }
          EOF

      - name: Commit and push
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add app-release.apk last_built_tag canary.json
          git commit -m "Build Magisk ${{ steps.check.outputs.tag }} with zygote64_32 patch"
          git push
